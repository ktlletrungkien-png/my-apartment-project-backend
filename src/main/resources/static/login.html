<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 32px;
            width: 360px;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        h2 {
            margin-top: 0;
            text-align: center;
        }

        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background: #1d4ed8;
        }

        .message {
            margin-top: 12px;
            text-align: center;
            color: red;
        }
    </style>
</head>
<body>
<div class="login-box">
    <h2>Đăng nhập</h2>

    <form method="post" action="/login">
        <label for="username">Tên đăng nhập</label>
        <input type="text" id="username" name="username" required>

        <label for="password">Mật khẩu</label>
        <input type="password" id="password" name="password" required>

        <button type="submit">Đăng nhập</button>
    </form>

    <div class="message" id="messageBox"></div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const messageBox = document.getElementById("messageBox");

    if (params.get("error")) {
        messageBox.innerText = "Sai tên đăng nhập hoặc mật khẩu.";
    }

    if (params.get("logout")) {
        messageBox.innerText = "Bạn đã đăng xuất.";
    }
</script>
</body>
</html>
