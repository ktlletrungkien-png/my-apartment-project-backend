<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <a href="/admin/dashboard.html">
      <button type="button">Dashboard</button>
    </a>
    <form id="user-form">
      <label> Username </label>
      <input type="text" id="username" required /><br />
      <label> Password </label>
      <input type="text" id="password" required /><br />
      <label> FullName </label>
      <input type="text" id="fullname" required /><br />
      <label> Phone </label>
      <input type="text" id="phone" required /><br />
      <label> Email </label>
      <input type="text" id="email" required /><br />
      <label> Role </label>
      <select id="role" name="role">
        <option value="manager">Quản lý</option>
        <option value="staff">Nhân viên</option>
        <option value="customer">Khách hàng</option>
      </select>
      <button type="button" id="save-user">Lưu người dùng</button>
    </form>
  </body>

  <script>
    document.getElementById("save-user").addEventListener("click", saveUser);
    async function saveUser() {
      const userData = {
        username: document.getElementById("username").value,
        password: document.getElementById("password").value,
        fullname: document.getElementById("fullname").value,
        phone: document.getElementById("phone").value,
        email: document.getElementById("email").value,
        role: document.getElementById("role").value,
      };
      if (!userData.username || !userData.password || !userData.role || !userData.fullname ) {
        alert("Vui lòng điền đầy đủ thông tin!");
        return;
      }
      try {
        const response = await fetch("http://localhost:8081/api/users", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(userData),
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`Lỗi khi gửi dữ liệu: ${response.status} ${errorText}`);
        }

        const result = await response.text();
        alert("Tạo user thành công!");
        console.log("Kết quả từ server:", result);
        document.getElementById("user-form").reset();
      } catch (error) {
        console.error(error);
        alert(error.message || "Không thể gửi dữ liệu đến server.");
      }
    }
  </script>
</html>
