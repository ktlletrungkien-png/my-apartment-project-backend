<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin cá nhân manager</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div class="staff-shell">
    <header class="staff-topbar">
        <a class="brand" href="/admin/dashboard.html"><span class="brand-mark">A</span><span>Manager Workspace</span></a>
        <nav class="staff-nav">
<!--            <a class="btn btn-secondary" href="/building-search.html">Dashboard</a>-->
            <a class="btn btn-secondary" href="/customer/building-search.html">Tòa nhà</a>
            <a class="btn btn-danger" href="/logout">Đăng xuất</a>
        </nav>
    </header>

    <main class="staff-page staff-page-narrow">
        <section class="hero-band">
            <div class="hero-copy">
                <span class="eyebrow">Tài khoản khách hàng</span>
                <h1 class="page-title">Thông tin cá nhân</h1>
                <p class="subtitle">Thông tin người dùng hiện đang đăng nhập.</p>
            </div>
        </section>

        <section class="profile-card">
            <div class="data-header"><div><h2 class="section-title">Hồ sơ manager</h2><p class="section-text">Dữ liệu lấy từ phiên đăng nhập hiện tại.</p></div></div>
            <div class="profile-list">
                <div class="profile-row"><span class="profile-label">ID</span><span class="profile-value" id="id"></span></div>
                <div class="profile-row"><span class="profile-label">Username</span><span class="profile-value" id="username"></span></div>
                <div class="profile-row"><span class="profile-label">Họ tên</span><span class="profile-value" id="fullName"></span></div>
                <div class="profile-row"><span class="profile-label">Role</span><span class="profile-value" id="roles"></span></div>
            </div>
        </section>
    </main>
</div>

<script>
    fetch('/api/auth/me')
        .then(response => {
            if (!response.ok) throw new Error('Không tải được thông tin người dùng');
            return response.json();
        })
        .then(data => {
            document.getElementById('id').innerText = data.id ?? '';
            document.getElementById('username').innerText = data.username ?? '';
            document.getElementById('fullName').innerText = data.fullName ?? '';
            document.getElementById('roles').innerText = (data.roles || []).join(', ');
        })
        .catch(error => alert(error.message));
</script>
</body>
</html>
